<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包裝部人均產值即時系統 - PACKING FLOW</title>
    
    <!-- 核心引擎 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- UI 樣式與圖表 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <!-- Firebase SDK (使用穩定相容版本) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
            AreaChart, Area, ReferenceLine, Cell 
        } = Recharts;

        // --- SVG 圖標組件 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const paths = {
                package: <path d="M16.5 9.4 7.5 4.21M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16zM3.27 6.96 12 12.01l8.73-5.05M12 22.08V12" />,
                clock: <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>,
                dashboard: <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>,
                plus: <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>,
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.72V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>,
                trash: <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>,
                filter: <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>,
                chevron: <polyline points="9 18 15 12 9 6"/>,
                target: <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name]}
                </svg>
            );
        };

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAOkwgZMyKE5DRxoVw22eseT8VbsCeX3eE",
            authDomain: "packaging-7427b.firebaseapp.com",
            projectId: "packaging-7427b",
            storageBucket: "packaging-7427b.firebasestorage.app",
            messagingSenderId: "1058360680341",
            appId: "1:1058360680341:web:cdba79a3b8866ddb45a09c"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "packaging-productivity-app";

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('record');
            const [loading, setLoading] = useState(true);
            const [config, setConfig] = useState({
                machines: ['凱炫機', '自動包裝機', '立式機'],
                leaders: ['組長A', '組長B', '組長C'],
                flavors: ['巧巧酥', '原味蛋捲', '芝麻餅乾']
            });
            const [records, setRecords] = useState([]);
            const [dashboardFilter, setDashboardFilter] = useState({ machine: '全部', leader: '全部' });
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                machine: '', leader: '', flavor: '', staffCount: 3,
                startTime: '08:00', endTime: '12:00', prepTime: 10, totalUnits: 0
            });

            useEffect(() => {
                auth.signInAnonymously().catch(e => console.error("Auth error", e));
                return auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubConfig = db.doc(`artifacts/${appId}/public/data/system_config`).onSnapshot(doc => {
                    if (doc.exists) setConfig(doc.data());
                    else db.doc(`artifacts/${appId}/public/data/system_config`).set(config);
                });
                const unsubRecords = db.collection(`artifacts/${appId}/public/data/production_records`).onSnapshot(snap => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setRecords(data.sort((a, b) => new Date(b.date) - new Date(a.date)));
                });
                return () => { unsubConfig(); unsubRecords(); };
            }, [user]);

            useEffect(() => {
                if (config.machines.length > 0) {
                    setFormData(p => ({
                        ...p,
                        machine: p.machine || config.machines[0],
                        leader: p.leader || config.leaders[0],
                        flavor: p.flavor || config.flavors[0]
                    }));
                }
            }, [config]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (formData.totalUnits <= 0) return;
                const [h1, m1] = formData.startTime.split(':').map(Number);
                const [h2, m2] = formData.endTime.split(':').map(Number);
                let dur = (h2 * 60 + m2) - (h1 * 60 + m1);
                if (dur < 0) dur += 1440;
                const totalMin = (dur + Number(formData.prepTime)) * formData.staffCount;
                const upph = totalMin > 0 ? Math.round((formData.totalUnits / totalMin) * 60) : 0;
                await db.collection(`artifacts/${appId}/public/data/production_records`).add({ ...formData, duration: dur, upph });
                setFormData(p => ({ ...p, totalUnits: 0 }));
            };

            const stats = useMemo(() => {
                const filtered = records.filter(r => 
                    (dashboardFilter.machine === '全部' || r.machine === dashboardFilter.machine) &&
                    (dashboardFilter.leader === '全部' || r.leader === dashboardFilter.leader)
                );
                const daily = {}; const flav = {}; const lead = {};
                filtered.forEach(r => {
                    if (!daily[r.date]) daily[r.date] = { sum: 0, count: 0 };
                    daily[r.date].sum += (r.upph || 0); daily[r.date].count++;
                    if (!flav[r.flavor]) flav[r.flavor] = { name: r.flavor, sum: 0, count: 0 };
                    flav[r.flavor].sum += (r.upph || 0); flav[r.flavor].count++;
                    if (!lead[r.leader]) lead[r.leader] = { name: r.leader, sum: 0, count: 0 };
                    lead[r.leader].sum += (r.upph || 0); lead[r.leader].count++;
                });
                return {
                    trend: Object.keys(daily).sort().map(d => ({ date: d.slice(5), avg: Math.round(daily[d].sum/daily[d].count) })),
                    flavor: Object.values(flav).map(f => ({ name: f.name, avg: Math.round(f.sum/f.count) })).sort((a,b)=>b.avg-a.avg),
                    leader: Object.values(lead).map(l => ({ name: l.name, avg: Math.round(l.sum/l.count) })),
                    avg: filtered.length ? Math.round(filtered.reduce((a,c)=>a+(c.upph||0),0)/filtered.length) : 0,
                    count: filtered.length
                };
            }, [records, dashboardFilter]);

            if (loading) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-bold">連線雲端中...</div>;

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-xl">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-black italic tracking-tighter flex items-center gap-2">
                                <Icon name="package" className="text-indigo-500" /> PACKING FLOW
                            </h1>
                            <nav className="flex gap-1 bg-slate-800 p-1 rounded-xl">
                                {['record', 'dashboard', 'settings'].map(tab => (
                                    <button key={tab} onClick={()=>setActiveTab(tab)} className={`px-4 py-2 rounded-lg text-sm font-bold ${activeTab===tab?'bg-indigo-600':'text-slate-400'}`}>
                                        {tab === 'record' ? '數據錄入' : tab === 'dashboard' ? '報表' : '設定'}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-8">
                        {activeTab === 'record' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-5 bg-white p-6 rounded-3xl border shadow-sm">
                                    <h2 className="font-black text-indigo-700 mb-6 italic flex items-center gap-2"><Icon name="clock" size={18} /> NEW LOG</h2>
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="col-span-2 text-xs font-bold text-slate-400 uppercase">生產日期</div>
                                            <input type="date" className="col-span-2 w-full p-2.5 bg-slate-50 border rounded-xl font-bold" value={formData.date} onChange={e=>setFormData({...formData, date:e.target.value})} />
                                            <div className="text-xs font-bold text-slate-400">機台</div>
                                            <div className="text-xs font-bold text-slate-400">組長</div>
                                            <select className="p-2.5 bg-slate-50 border rounded-xl font-bold" value={formData.machine} onChange={e=>setFormData({...formData, machine:e.target.value})}>{config.machines.map(m=><option key={m}>{m}</option>)}</select>
                                            <select className="p-2.5 bg-slate-50 border rounded-xl font-bold" value={formData.leader} onChange={e=>setFormData({...formData, leader:e.target.value})}>{config.leaders.map(l=><option key={l}>{l}</option>)}</select>
                                        </div>
                                        <div className="text-xs font-bold text-slate-400 uppercase">口味</div>
                                        <select className="w-full p-2.5 bg-slate-50 border rounded-xl font-bold" value={formData.flavor} onChange={e=>setFormData({...formData, flavor:e.target.value})}>{config.flavors.map(f=><option key={f}>{f}</option>)}</select>
                                        <div className="grid grid-cols-2 gap-4 p-4 bg-slate-900 rounded-2xl text-white">
                                            <div><label className="text-[10px] opacity-50">開始時間</label><input type="time" className="w-full bg-transparent border-b border-slate-700 font-bold" value={formData.startTime} onChange={e=>setFormData({...formData, startTime:e.target.value})} /></div>
                                            <div><label className="text-[10px] opacity-50">結束時間</label><input type="time" className="w-full bg-transparent border-b border-slate-700 font-bold" value={formData.endTime} onChange={e=>setFormData({...formData, endTime:e.target.value})} /></div>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            <div className="text-center"><label className="text-[10px] font-bold text-slate-400 uppercase">人數</label><input type="number" className="w-full p-2 bg-slate-50 border rounded-xl font-bold" value={formData.staffCount} onChange={e=>setFormData({...formData, staffCount:Number(e.target.value)})} /></div>
                                            <div className="text-center"><label className="text-[10px] font-bold text-slate-400 uppercase">前置</label><input type="number" className="w-full p-2 bg-slate-50 border rounded-xl font-bold" value={formData.prepTime} onChange={e=>setFormData({...formData, prepTime:Number(e.target.value)})} /></div>
                                            <div className="text-center"><label className="text-[10px] font-bold text-slate-400 uppercase">總量</label><input type="number" className="w-full p-2 bg-slate-50 border rounded-xl font-bold" value={formData.totalUnits} onChange={e=>setFormData({...formData, totalUnits:Number(e.target.value)})} /></div>
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest">SAVE TO CLOUD</button>
                                    </form>
                                </div>
                                <div className="lg:col-span-7 space-y-3">
                                    <h2 className="font-black text-slate-700 italic">LOG HISTORY ({records.length})</h2>
                                    <div className="space-y-2 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                                        {records.map(r => (
                                            <div key={r.id} className="bg-white p-4 rounded-2xl border flex items-center justify-between group">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-12 h-12 rounded-xl flex flex-col items-center justify-center font-black ${r.upph>=300?'bg-emerald-500 text-white':'bg-rose-500 text-white'}`}>
                                                        <span className="text-sm leading-none">{r.upph}</span>
                                                        <span className="text-[7px] uppercase opacity-80">UPPH</span>
                                                    </div>
                                                    <div>
                                                        <div className="font-bold text-slate-800">{r.machine} <Icon name="chevron" size={12} className="inline mx-1 text-slate-300"/> {r.flavor}</div>
                                                        <div className="text-[10px] text-slate-400 font-bold uppercase">{r.date} · {r.leader} · {r.staffCount}人</div>
                                                    </div>
                                                </div>
                                                <button onClick={()=>db.collection(`artifacts/${appId}/public/data/production_records`).doc(r.id).delete()} className="text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all font-bold text-xs">刪除</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-8">
                                <div className="bg-white p-6 rounded-3xl border flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm">
                                    <div className="flex gap-4">
                                        <div className="flex items-center gap-2">
                                            <Icon name="filter" size={14} className="text-slate-400" />
                                            <select className="bg-slate-100 p-2 rounded-lg font-bold text-sm" value={dashboardFilter.machine} onChange={e=>setDashboardFilter({...dashboardFilter, machine:e.target.value})}><option>全部</option>{config.machines.map(m=><option key={m}>{m}</option>)}</select>
                                            <select className="bg-slate-100 p-2 rounded-lg font-bold text-sm" value={dashboardFilter.leader} onChange={e=>setDashboardFilter({...dashboardFilter, leader:e.target.value})}><option>全部</option>{config.leaders.map(l=><option key={l}>{l}</option>)}</select>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">平均效率</div>
                                        <div className={`text-4xl font-black ${stats.avg>=300?'text-emerald-500':'text-rose-500'}`}>{stats.avg} <span className="text-xs font-normal opacity-50">UPPH</span></div>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-3xl border h-80 shadow-sm">
                                    <h3 className="font-black text-slate-400 text-[10px] uppercase mb-6 tracking-widest italic">Productivity Trend</h3>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={stats.trend}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="date" fontSize={10} axisLine={false} tickLine={false} />
                                            <YAxis fontSize={10} axisLine={false} tickLine={false} />
                                            <Tooltip />
                                            <ReferenceLine y={300} stroke="#fb7185" strokeDasharray="5 5" label={{value:'目標', position:'right', fill:'#fb7185', fontSize:10}} />
                                            <Area type="monotone" dataKey="avg" stroke="#6366f1" fill="#6366f1" fillOpacity={0.1} strokeWidth={3} />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-3xl border shadow-sm">
                                        <h3 className="font-black text-slate-400 text-[10px] uppercase mb-6 tracking-widest italic text-center flex items-center justify-center gap-2"><Icon name="target" size={14} /> Flavor Ranking</h3>
                                        <div className="space-y-4">
                                            {stats.flavor.map(f => (
                                                <div key={f.name}>
                                                    <div className="flex justify-between text-[10px] font-black uppercase mb-1"><span>{f.name}</span><span>{f.avg} UPPH</span></div>
                                                    <div className="h-1.5 bg-slate-50 rounded-full overflow-hidden border"><div className={`h-full ${f.avg>=300?'bg-emerald-500':'bg-rose-500'}`} style={{ width: `${Math.min(100, (f.avg/450)*100)}%` }}></div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border shadow-sm h-64">
                                        <h3 className="font-black text-slate-400 text-[10px] uppercase mb-6 tracking-widest italic text-center">Leader Performance</h3>
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={stats.leader}>
                                                <XAxis dataKey="name" fontSize={10} axisLine={false} tickLine={false} />
                                                <Tooltip cursor={{fill: '#f8fafc'}} />
                                                <Bar dataKey="avg" radius={[4, 4, 0, 0]} barSize={30}>
                                                    {stats.leader.map((e, i) => <Cell key={i} fill={e.avg>=300?'#6366f1':'#fb7185'} />)}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {['machines', 'leaders', 'flavors'].map(type => (
                                    <div key={type} className="bg-white p-6 rounded-3xl border shadow-sm">
                                        <h3 className="font-black text-slate-700 uppercase mb-4 text-sm tracking-widest">{type==='machines'?'機台名單':type==='leaders'?'組長名單':'產品口味'}</h3>
                                        <div className="flex gap-2 mb-4">
                                            <input type="text" id={`in-${type}`} className="flex-1 p-2 bg-slate-50 border rounded-lg text-sm font-bold" placeholder="輸入..." />
                                            <button onClick={() => {
                                                const el = document.getElementById(`in-${type}`);
                                                if(el.value) {
                                                    const newC = { ...config, [type]: [...config[type], el.value.trim()] };
                                                    db.doc(`artifacts/${appId}/public/data/system_config`).set(newC);
                                                    el.value = '';
                                                }
                                            }} className="bg-indigo-600 text-white w-8 h-8 rounded-lg font-bold">+</button>
                                        </div>
                                        <div className="space-y-2 h-64 overflow-y-auto custom-scrollbar">
                                            {config[type].map(item => (
                                                <div key={item} className="flex justify-between items-center p-2 bg-slate-50 rounded-lg text-xs font-bold border border-slate-100">
                                                    <span>{item}</span>
                                                    <button onClick={() => {
                                                        const newC = { ...config, [type]: config[type].filter(i=>i!==item) };
                                                        db.doc(`artifacts/${appId}/public/data/system_config`).set(newC);
                                                    }} className="text-slate-300 hover:text-rose-500 font-black">×</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
